  --gray:     #6B7280;

  --safe-b:   env(safe-area-inset-bottom, 0px);

  --font-b:   'Nunito', sans-serif;
}

html {
  height: 100%;
  overscroll-behavior: none;
  -webkit-text-size-adjust: 100%;
}

body {
  background: var(--cream);
  font-family: var(--font-b);
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;

  padding-bottom: calc(70px + var(--safe-b));
}

  inset: 0;

  max-width: 1100px;

  z-index: 10;
}

  width: 100%;

}

  background: var(--blue);
  border-radius: 20px 20px 0 0;
  padding: 14px 20px 12px;

  border: none;
  cursor: pointer;
  font-family: var(--font-d);
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  padding: 5px 12px;
  border-radius: 100px;
  transition: all 0.18s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  gap: 5px;
}

.mode-pill-btn.active {
  background: var(--white);
  color: var(--blue-dk);
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

.color-strip {
  display: flex;
  height: 7px;
  border-radius: 0 0 8px 8px;
  overflow: hidden;
}

.color-strip span { flex: 1; }
.cs1{background:#EF233C;}
.cs2{background:#FF6B35;}
.cs3{background:#FFD23F;}
.cs4{background:#06D6A0;}
.cs5{background:#3A86FF;}
.cs6{background:#9B5DE5;}
.cs7{background:#F72585;}

/* ── MAIN LAYOUT ── */
.main-layout {
  width: 100%;
  max-width: 1100px;
  padding: 14px 14px 0;
  position: relative;
  z-index: 10;
  display: flex;
  gap: 16px;
  flex-direction: column;
}

@media (min-width: 820px) {
  .main-layout { flex-direction: row; align-items: flex-start; }
  .col-left    { flex: 1; min-width: 0; }
  .col-right   { width: 380px; flex-shrink: 0; position: sticky; top: 14px; max-height: calc(100vh - 28px); overflow-y: auto; }
}

/* ── CARD BASE ── */
.card {
  background: var(--white);
  border: 2.5px solid var(--dark);
  border-radius: 20px;
  box-shadow: 5px 5px 0 var(--dark);
  overflow: hidden;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.9) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}

@keyframes flashGreen {
  0%,100% { background: var(--white); }
  30% { background: #D1FAF0; }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── SCAN MODE INDICATOR ── */
.scan-mode-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px 10px;
  border-bottom: 2px dashed #E5E7EB;
  gap: 10px;
}

.scan-mode-label {
  font-family: var(--font-d);
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 7px;
}

.scan-mode-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(6,214,160,0.25);
  animation: pulse-dot 1.5s ease-in-out infinite;
  flex-shrink: 0;
}

.scan-mode-dot.manual {
  background: var(--orange);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.25);
}

@keyframes pulse-dot {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.4); }
}

/* Desktop mode toggle inside card (hidden on mobile — uses header pill) */
.inline-mode-toggle { display: none; }

@media (min-width: 820px) {
  .inline-mode-toggle {
    display: flex;
    align-items: center;
    background: var(--gray-l);
    border: 2px solid #E5E7EB;
    border-radius: 100px;
    padding: 3px;
    gap: 2px;
  }

  .imt-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-d);
    font-size: 12px;
    color: var(--gray);
    padding: 5px 12px;
    border-radius: 100px;
    transition: all 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
    -webkit-tap-highlight-color: transparent;
  }

  .imt-btn.active {
    background: var(--dark);
    color: var(--white);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  }
}

/* ── SCANNER BODY ── */
.scanner-body {
  padding: 14px 18px 16px;
}

/* scan visual — only show in scan mode */
.scan-visual {
  height: 64px;
  background: var(--gray-l);
  border: 2px dashed #D1D5DB;
  border-radius: 14px;
  position: relative;
  overflow: hidden;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
}

.scan-visual.hidden { display: none; }

.scan-icon { font-size: 22px; }

.scan-ready-txt {
  font-family: var(--font-d);
  font-size: 13px;
  color: var(--gray);
}

.scan-line {
  position: absolute;
  top: 0;
  left: -3px;
  width: 3px;
  height: 100%;
  background: linear-gradient(180deg, transparent, var(--orange), transparent);
  animation: scanMove 2.2s ease-in-out infinite;
  border-radius: 2px;
}

.scan-visual.paused .scan-line {
  animation-play-state: paused;
  opacity: 0;
}

@keyframes scanMove {
  0%   { left: -3px; opacity: 0; }
  8%   { opacity: 1; }
  92%  { opacity: 1; }
  100% { left: 100%; opacity: 0; }
}

.input-row {
  display: flex;
  gap: 8px;
}

.kode-input {
  flex: 1;
  background: var(--gray-l);
  border: 2px solid #E5E7EB;
  border-radius: 14px;
  padding: 14px 16px;
  font-family: var(--font-b);
  font-weight: 800;
  color: var(--dark);
  font-size: max(16px, 1em);
  outline: none;
  transition: all 0.18s;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  width: 100%;
  min-width: 0;
}

.kode-input::placeholder {
  font-size: 13px;
  font-weight: 600;
  color: #9CA3AF;
  text-transform: none;
  letter-spacing: 0;
}

.kode-input:focus {
  border-color: var(--blue);
  background: #EFF6FF;
  box-shadow: 0 0 0 3px rgba(58,134,255,0.18);
}

/* manual mode */
.kode-input.manual-mode {
  border-color: var(--orange);
  background: #FFF7F0;
}

.kode-input.manual-mode:focus {
  border-color: var(--orange);
  background: #FFF7F0;
  box-shadow: 0 0 0 3px rgba(255,107,53,0.18);
}

.btn-tambah {
  background: var(--orange);
  color: var(--white);
  border: 2.5px solid var(--dark);
  border-radius: 14px;
  padding: 14px 16px;
  font-family: var(--font-d);
  font-size: 15px;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 4px 4px 0 var(--dark);
  min-height: 52px;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.13s;
  flex-shrink: 0;
}

.btn-tambah:active {
  transform: translate(2px,2px);
  box-shadow: 1px 1px 0 var(--dark);
}

.hint-text {
  margin-top: 9px;
  font-size: 11px;
  font-weight: 700;
  color: var(--gray);
  text-align: center;
  transition: all 0.2s;
}

/* ── LAST SCANNED TOAST ── */
.last-scan-toast {
  margin: 0 18px 14px;
  background: #D1FAF0;
  border: 2px solid var(--green-dk);
  border-radius: 14px;
  padding: 10px 14px;
  display: none;
  align-items: center;
  gap: 10px;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

.last-scan-toast.show { display: flex; }

.lst-emoji {
  font-size: 22px;
  flex-shrink: 0;
}

.lst-info {
  flex: 1;
  min-width: 0;
}

.lst-nama {
  font-family: var(--font-d);
  font-size: 13px;
  color: var(--dark);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.lst-harga {
  font-size: 11px;
  font-weight: 800;
  color: var(--green-dk);
}

.lst-qty-badge {
  background: var(--green);
  color: var(--white);
  font-family: var(--font-d);
  font-size: 13px;
  padding: 4px 10px;
  border-radius: 100px;
  border: 2px solid var(--dark);
  white-space: nowrap;
  flex-shrink: 0;
  box-shadow: 2px 2px 0 var(--dark);
}

/* ── ERROR TOAST ── */
.error-toast {
  margin: 0 18px 14px;
  background: #FEE2E2;
  border: 2px solid var(--red);
  border-radius: 14px;
  padding: 10px 14px;
  display: none;
  align-items: center;
  gap: 10px;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

.error-toast.show { display: flex; }

.et-emoji {
  font-size: 22px;
  flex-shrink: 0;
}

.et-msg {
  font-family: var(--font-d);
  font-size: 13px;
  color: var(--red);
}

/* ── KERANJANG CARD ── */
.keranjang-header {
  background: var(--green);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2.5px solid var(--dark);
}

.keranjang-title {
  font-family: var(--font-d);
  font-size: 17px;
  color: var(--white);
  display: flex;
  align-items: center;
  gap: 7px;
}

.k-count {
  background: rgba(255,255,255,0.3);
  border-radius: 100px;
  padding: 1px 9px;
  font-size: 14px;
}

.btn-clear-k {
  background: rgba(255,255,255,0.2);
  color: var(--white);
  border: 2px solid rgba(255,255,255,0.45);
  border-radius: 10px;
  padding: 5px 11px;
  font-family: var(--font-d);
  font-size: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.btn-clear-k:active {
  background: rgba(255,255,255,0.4);
}

/* empty */
.cart-empty {
  padding: 36px 20px;
  text-align: center;
}

.cart-empty-emoji { font-size: 44px; margin-bottom: 8px; }

.cart-empty-text {
  font-family: var(--font-d);
  font-size: 16px;
  color: var(--gray);
  margin-bottom: 4px;
}

.cart-empty-sub {
  font-size: 11px;
  font-weight: 700;
  color: #9CA3AF;
}

/* items */
.cart-list {}

.cart-item {
  display: grid;
  grid-template-columns: 30px 1fr auto auto;
  align-items: center;
  gap: 9px;
  padding: 11px 16px;
  border-bottom: 2px dashed #E5E7EB;
  transition: background 0.2s;
}

.cart-item:last-child { border-bottom: none; }

.cart-item.flash { animation: flashGreen 0.5s ease; }

.ci-emoji { font-size: 20px; text-align: center; }

.ci-info { min-width: 0; }

.ci-nama {
  font-family: var(--font-d);
  font-size: 13px;
  color: var(--dark);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}

.ci-sub {
  font-size: 10px;
  font-weight: 700;
  color: var(--gray);
  margin-top: 1px;
}

.qty-ctrl {
  display: flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
}

.qty-btn {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 2px solid var(--dark);
  background: var(--gray-l);
  font-family: var(--font-d);
  font-size: 16px;
  color: var(--dark);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 2px 2px 0 var(--dark);
  transition: all 0.1s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}

.qty-btn::after {
  content: '';
  position: absolute;
  inset: -6px;
}

.qty-btn:active {
  transform: translate(1px,1px);
  box-shadow: 0 0 0 var(--dark);
}

.qty-btn.minus { background: #FEE2E2; }

.qty-btn.minus:active { background: #fca5a5; }

.qty-input {
  font-family: var(--font-d);
  font-size: 15px;
  color: var(--dark);
  width: 42px;
  text-align: center;
  background: var(--white);
  border: 2px solid #D1D5DB;
  border-radius: 8px;
  padding: 3px 4px;
  outline: none;
  -moz-appearance: textfield;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.qty-input::-webkit-inner-spin-button,
.qty-input::-webkit-outer-spin-button {
  -webkit-appearance: none;
}

.qty-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(58,134,255,0.18);
}

.qty-input.invalid {
  border-color: var(--red);
  background: #FEE2E2;
}

.ci-harga-col {
  text-align: right;
  flex-shrink: 0;
}

.ci-harga {
  font-family: var(--font-d);
  font-size: 13px;
  color: var(--blue);
  white-space: nowrap;
}

.ci-subtotal {
  font-size: 10px;
  font-weight: 700;
  color: var(--gray);
  white-space: nowrap;
}

/* total footer */
.cart-footer {
  border-top: 2.5px solid var(--dark);
  padding: 14px 18px 16px;
  background: #FFFEF5;
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 0;
}

.total-lbl {
  font-size: 12px;
  font-weight: 700;
  color: var(--gray);
}

.total-val {
  font-size: 13px;
  font-weight: 800;
  color: var(--dark);
}

.total-grand {
  border-top: 2px dashed #D1D5DB;
  margin-top: 8px;
  padding-top: 10px;
}

.total-grand .total-lbl {
  font-family: var(--font-d);
  font-size: 16px;
  color: var(--dark);
}

.total-grand .total-val {
  font-family: var(--font-d);
  font-size: clamp(20px, 4vw, 26px);
  color: var(--green-dk);
}

.btn-reset {
  width: 100%;
  margin-top: 12px;
  background: var(--gray-l);
  color: var(--gray);
  border: 2px solid #D1D5DB;
  border-radius: 12px;
  padding: 11px;
  font-family: var(--font-d);
  font-size: 14px;
  cursor: pointer;
  box-shadow: 3px 3px 0 #D1D5DB;
  -webkit-tap-highlight-color: transparent;
  min-height: 46px;
}

.btn-reset:active {
  background: #FEE2E2;
  color: var(--red);
  border-color: var(--red);
}

/* ── MOBILE BOTTOM NAV (< 820px) ── */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: calc(62px + var(--safe-b));
  padding-bottom: var(--safe-b);
  background: var(--white);
  border-top: 3px solid var(--dark);
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
}

.bottom-nav-inner {
  display: flex;
  height: 62px;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: none;
  border: none;
  font-family: var(--font-b);
  font-size: 10px;
  font-weight: 800;
  color: var(--gray);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  padding: 6px 4px 4px;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.nav-btn .nav-icon {
  font-size: 22px;
  line-height: 1;
  transition: transform 0.2s;
}

.nav-btn.active { color: var(--blue); }

.nav-btn.active .nav-icon { transform: scale(1.15); }

.nav-btn.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 38px;
  height: 3px;
  background: var(--blue);
  border-radius: 0 0 4px 4px;
}

.nav-badge {
  position: absolute;
  top: 4px;
  right: calc(50% - 24px);
  background: var(--red);
  color: var(--white);
  font-size: 10px;
  font-weight: 900;
  min-width: 17px;
  height: 17px;
  border-radius: 9px;
  padding: 0 3px;
  display: none;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--white);
}

.nav-badge.show {
  display: flex;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

/* On mobile: only show active panel */
@media (max-width: 819px) {
  .bottom-nav { display: block; }

  body {
    padding-bottom: calc(62px + var(--safe-b) + 10px);
  }

  .col-left, .col-right { width: 100%; }

  .col-left.mob-hidden,
  .col-right.mob-hidden {
    display: none;
  }

  /* hide inline mode toggle, show header pill */
  .inline-mode-toggle { display: none !important; }
}

@media (min-width: 820px) {
  /* always show both cols on desktop */
  .col-left.mob-hidden,
  .col-right.mob-hidden {
    display: block !important;
  }

  /* hide header mode pill on desktop (use inline toggle) */
  .mode-pill { display: none !important; }
}

footer {
  width: 100%;
  max-width: 1100px;
  padding: 10px 14px 0;
  position: relative;
  z-index: 10;
  font-size: 11px;
  font-weight: 700;
  color: var(--gray);
  text-align: center;
}

@media (min-width: 820px) and (hover: hover) {
  .btn-tambah:hover {
    transform: translate(-2px,-2px);
    box-shadow: 6px 6px 0 var(--dark);
  }

  .qty-btn:hover {
    background: var(--yellow);
    transform: translate(-1px,-1px);
  }

  .qty-btn.minus:hover {
    background: var(--red);
    color: var(--white);
  }
}

/* ── MOBILE IMPROVEMENTS ── */
button, input {
  touch-action: manipulation;
}

@media (max-width: 480px) {
  .wrap,
  header,
  .main-layout {
    padding-left: 10px;
    padding-right: 10px;
  }

  .header-banner {
    padding: 12px;
    border-radius: 16px 16px 0 0;
    gap: 10px;
  }

  .hdr-emoji {
    font-size: 26px;
  }

  .store-title {
    font-size: 18px;
  }

  .store-subtitle {
    font-size: 10px;
  }

  .scan-mode-bar {
    padding: 10px 12px 8px;
  }

  .scan-mode-label {
    font-size: 12px;
  }

  .scanner-body {
    padding: 12px;
  }

  .input-row {
    flex-direction: column;
    gap: 10px;
  }

  .kode-input {
    width: 100%;
    font-size: 16px;
    padding: 16px;
  }

  .btn-tambah {
    width: 100%;
    padding: 16px;
    font-size: 16px;
  }

  .scan-visual {
    height: 52px;
  }

  .scan-ready-txt {
    font-size: 11px;
  }

  .last-scan-toast,
  .error-toast {
    margin: 0 10px 12px;
    padding: 10px;
    border-radius: 12px;
  }

  .lst-nama {
    font-size: 12px;
  }

  .lst-harga {
    font-size: 10px;
  }

  .cart-item {
    grid-template-columns: 24px 1fr;
    grid-template-rows: auto auto auto;
    gap: 6px;
    padding: 10px;
  }

  .ci-emoji {
    grid-row: span 3;
    font-size: 18px;
  }

  .ci-info {
    min-width: 0;
  }

  .ci-nama {
    font-size: 12px;
  }

  .qty-ctrl {
    grid-column: 2 / -1;
    justify-content: flex-start;
    margin-top: 2px;
    flex-wrap: wrap;
  }

  .ci-harga-col {
    grid-column: 2 / -1;
    text-align: left;
    margin-top: 2px;
  }

  .qty-btn {
    width: 28px;
    height: 28px;
  }

  .qty-input {
    width: 40px;
    font-size: 14px;
  }

  .cart-footer {
    padding: 12px;
  }

  .card {
    box-shadow: 3px 3px 0 var(--dark);
  }
}

/* safety */
img, video, canvas, svg {
  max-width: 100%;
  height: auto;
}

<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-banner">
    <span class="hdr-emoji">👑</span>
    <div class="hdr-text">
      <div class="store-title">Cek Harga Mainan</div>
      <div class="store-subtitle">Scan · Cek Harga · Hitung Belanja</div>
    </div>
    <!-- Mode toggle (mobile: in header) -->
    <div class="mode-pill" id="headerModePill">
      <button class="mode-pill-btn active" id="hdrBtnScan" onclick="setMode('scan')">📷 Scan</button>
      <button class="mode-pill-btn"        id="hdrBtnManual" onclick="setMode('manual')">⌨️ Manual</button>
    </div>
  </div>
  <div class="color-strip">
    <span class="cs1"></span><span class="cs2"></span><span class="cs3"></span>
    <span class="cs4"></span><span class="cs5"></span><span class="cs6"></span>
    <span class="cs7"></span>
  </div>
</header>

<!-- ── MAIN ── -->
<div class="main-layout">

  <!-- LEFT: Scanner + last result -->
  <div class="col-left" id="colLeft">

    <div class="card">
      <!-- mode bar -->
      <div class="scan-mode-bar">
        <div class="scan-mode-label">
          <span class="scan-mode-dot" id="modeDot"></span>
          <span id="modeLabel">Mode Scan Aktif</span>
        </div>
        <!-- Desktop inline toggle -->
        <div class="inline-mode-toggle" id="desktopModeToggle">
          <button class="imt-btn active" id="deskBtnScan"   onclick="setMode('scan')">📷 Scan</button>
          <button class="imt-btn"        id="deskBtnManual" onclick="setMode('manual')">⌨️ Manual</button>
        </div>
      </div>

      <div class="scanner-body">
        <!-- scan animation bar (hidden in manual mode) -->
        <div class="scan-visual" id="scanVisual">
          <div class="scan-icon">𝄃𝄂𝄀𝄁𝄃𝄂𝄂𝄃</div>
          <div class="scan-ready-txt">Siap Scan Barcode...</div>
          <div class="scan-line"></div>
        </div>

        <div class="input-row">
          <input
            type="text" id="kodeInput" class="kode-input"
            placeholder="Arahkan dan tekan cursor mouse ke sini..."
            autocomplete="off" autocorrect="off"
            autocapitalize="characters" inputmode="text"
          />
          <!-- In manual mode, show Tambah button -->
          <button class="btn-tambah" id="btnTambah" onclick="submitManual()" style="display:none">
            ➕ Tambah
          </button>
        </div>
        <div class="hint-text" id="hintText">📷 Arahkan dan tekan cursor mouse ke kolom input di atas dan scan barcode barang</div>
      </div>

      <!-- Last scan success toast -->
      <div class="last-scan-toast" id="lastScanToast">
        <div class="lst-emoji" id="lstEmoji">🎁</div>
        <div class="lst-info">
          <div class="lst-nama" id="lstNama">—</div>
          <div class="lst-harga" id="lstHarga">—</div>
        </div>
        <div class="lst-qty-badge" id="lstQtyBadge">×1</div>
      </div>

      <!-- Error toast -->
      <div class="error-toast" id="errorToast">
        <div class="et-emoji">❌</div>
        <div class="et-msg" id="errorMsg">Barang tidak ditemukan</div>
      </div>

    </div>
  </div>

  <!-- RIGHT: Keranjang -->
  <div class="col-right mob-hidden" id="colRight">
    <div class="card">
      <div class="keranjang-header">
        <div class="keranjang-title">
          🛒 Keranjang
          <span class="k-count" id="kCount">0</span>
        </div>
        <button class="btn-clear-k" onclick="clearCart()">🗑️ Reset</button>
      </div>

      <div id="cartBody"></div>

      <div class="cart-footer" id="cartFooter" style="display:none">
        <div class="total-row">
          <span class="total-lbl">Total Item</span>
          <span class="total-val" id="totalItem">0</span>
        </div>
        <div class="total-row total-grand">
          <span class="total-lbl">Total Belanja</span>
          <span class="total-val" id="grandTotal">Rp 0</span>
        </div>
        <button class="btn-reset" onclick="clearCart()">🔄 Kosongkan Keranjang</button>
      </div>
    </div>
  </div>

</div>

<footer>👑 Sukses Crown Toys &nbsp;·&nbsp; v3.0</footer>

<!-- ── MOBILE BOTTOM NAV ── -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="nav-btn active" id="navScan" onclick="mobileTab('scan')">
      <span class="nav-icon">🔍</span>Scanner
    </button>
    <button class="nav-btn" id="navCart" onclick="mobileTab('cart')">
      <span class="nav-icon">🛒</span>Keranjang
      <span class="nav-badge" id="navBadge">0</span>
    </button>
  </div>
</nav>

<script>
/* ═══════════════════════════════════
   HELPERS
═══════════════════════════════════ */
const kategoriEmoji = {
  'MOTOR':'🏍️','MOBIL':'🚗','ROBOT':'🤖','BONEKA':'🪆',
  'PUZZLE':'🧩','ACTION':'⚔️','BAYI':'🍼','EDUKASI':'📚',
};
function getEmoji(k) {
  const key = (k||'').toUpperCase();
  for (const [m,v] of Object.entries(kategoriEmoji)) if (key.includes(m)) return v;
  return '🎁';
}
function formatRp(n) {
  return 'Rp\u00A0' + new Intl.NumberFormat('id-ID').format(n);
}

/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
let cart       = [];
let scanMode   = 'scan';   // 'scan' | 'manual'
let debounce   = null;
let toastTimer = null;

function cartTotal()     { return cart.reduce((s,i) => s + i.harga * i.qty, 0); }
function cartItemCount() { return cart.reduce((s,i) => s + i.qty, 0); }

/* ═══════════════════════════════════
   MODE TOGGLE
═══════════════════════════════════ */
function setMode(mode) {
  scanMode = mode;
  const inp        = document.getElementById('kodeInput');
  const scanVis    = document.getElementById('scanVisual');
  const btnTambah  = document.getElementById('btnTambah');
  const modeDot    = document.getElementById('modeDot');
  const modeLabel  = document.getElementById('modeLabel');
  const hintText   = document.getElementById('hintText');

  // Header pill
  document.getElementById('hdrBtnScan').classList.toggle('active',   mode==='scan');
  document.getElementById('hdrBtnManual').classList.toggle('active', mode==='manual');
  // Desktop inline
  document.getElementById('deskBtnScan').classList.toggle('active',   mode==='scan');
  document.getElementById('deskBtnManual').classList.toggle('active', mode==='manual');

  if (mode === 'scan') {
    scanVis.classList.remove('hidden');
    btnTambah.style.display = 'none';
    inp.classList.remove('manual-mode');
    inp.placeholder = 'Arahkan dan tekan cursor mouse ke sini...';
    inp.readOnly    = false;
    modeDot.classList.remove('manual');
    modeLabel.textContent = 'Mode Scan Aktif';
    hintText.textContent  = '📷 Arahkan dan tekan cursor mouse ke kolom input di atas dan scan barcode barang';
    // In scan mode: clear & refocus so scanner can write to it
    inp.value = '';
    inp.focus();
    hideToasts();
  } else {
    scanVis.classList.add('hidden');
    btnTambah.style.display = '';
    inp.classList.add('manual-mode');
    inp.placeholder = 'Ketik kode barang...';
    inp.readOnly    = false;
    modeDot.classList.add('manual');
    modeLabel.textContent = 'Mode Manual Aktif';
    hintText.textContent  = '⌨️ Ketik kode barang lalu tekan Tambah atau Enter';
    inp.value = '';
    inp.focus();
    hideToasts();
  }
}

/* ═══════════════════════════════════
   INPUT HANDLING
═══════════════════════════════════ */
const inp = document.getElementById('kodeInput');

inp.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    clearTimeout(debounce);
    processKode(this.value.trim().toUpperCase());
  }
});

inp.addEventListener('input', function() {
  if (scanMode !== 'scan') return;   // scan mode only: auto-debounce
  clearTimeout(debounce);
  const val = this.value.trim();
  if (val.length >= 3) {
    debounce = setTimeout(() => processKode(val.toUpperCase()), 280);
  }
});

function submitManual() {
  const val = inp.value.trim().toUpperCase();
  if (!val) { inp.focus(); return; }
  processKode(val);
}

/* ═══════════════════════════════════
   CORE: fetch + auto-add to cart
═══════════════════════════════════ */
async function processKode(kode) {
  if (!kode) return;
  hideToasts();

  try {
    const res  = await fetch(`/api/cek-harga/${encodeURIComponent(kode)}`);
    const json = await res.json();

    if (json.success) {
      addToCartAuto(json.data);
      showSuccessToast(json.data);
    } else {
      showErrorToast(json.message || `Kode "${kode}" tidak ditemukan`);
    }
  } catch {
    showErrorToast('Tidak dapat terhubung ke server');
  }

  // Clear input & refocus
  setTimeout(() => {
    inp.value = '';
    if (scanMode === 'scan') inp.focus();
    else                     inp.focus();
  }, scanMode === 'scan' ? 60 : 0);
}

/* ═══════════════════════════════════
   CART
═══════════════════════════════════ */
function addToCartAuto(data) {
  const ex = cart.find(i => i.kode === data.kode);
  if (ex) {
    ex.qty++;
  } else {
    cart.push({
      kode: data.kode, nama: data.barang, kategori: data.kategori,
      harga: data.harga_jual, isi: data.isi, qty: 1
    });
  }
  updateBadge();
  renderCart(data.kode);   // pass kode to flash that row
}

function changeQty(kode, delta) {
  const item = cart.find(i => i.kode === kode);
  if (!item) return;
  const newQty = item.qty + delta;
  if (newQty <= 0) {
    cart = cart.filter(i => i.kode !== kode);
    updateBadge();
    renderCart();
    return;
  }
  item.qty = newQty;
  updateBadge();
  // Patch DOM in-place: update input value, harga, subtotal, total — no full re-render
  patchCartRow(kode);
  updateTotals();
}

function setQty(inputEl) {
  const kode = inputEl.dataset.kode;
  const item = cart.find(i => i.kode === kode);
  if (!item) return;

  const raw = parseInt(inputEl.value, 10);

  if (isNaN(raw) || raw < 1) {
    inputEl.classList.add('invalid');
    inputEl.value = item.qty;   // revert
    setTimeout(() => {
      inputEl.classList.remove('invalid');
    }, 800);
    return;
  }

  item.qty = raw;
  inputEl.classList.remove('invalid');
  updateBadge();
  patchCartRow(kode);
  updateTotals();
}

function patchCartRow(kode) {
  const item  = cart.find(i => i.kode === kode);
  const safeId = 'ci-' + kode.replace(/[^a-zA-Z0-9]/g,'');
  const row   = document.getElementById(safeId);
  if (!row || !item) return;

  // Sync input value in case changeQty called it
  const qtyInput = row.querySelector('.qty-input');
  if (qtyInput && parseInt(qtyInput.value) !== item.qty) qtyInput.value = item.qty;

  // Update harga & subtotal labels
  row.querySelector('.ci-harga').textContent    = formatRp(item.harga * item.qty);
  row.querySelector('.ci-subtotal').textContent = item.qty + '×' + formatRp(item.harga);

  // Flash row
  row.classList.remove('flash');
  void row.offsetWidth;
  row.classList.add('flash');
}

function updateTotals() {
  document.getElementById('totalItem').textContent  = cartItemCount() + ' item';
  document.getElementById('grandTotal').textContent = formatRp(cartTotal());
  document.getElementById('kCount').textContent     = cartItemCount();
}

function clearCart() {
  cart = [];
  updateBadge();
  renderCart();
}

function updateBadge() {
  const n = cartItemCount();
  ['navBadge'].forEach(id => {
    const b = document.getElementById(id);
    b.textContent = n;
    b.classList.toggle('show', n > 0);
  });
  document.getElementById('kCount').textContent = n;
}

function renderCart(flashKode) {
  const body   = document.getElementById('cartBody');
  const footer = document.getElementById('cartFooter');

  if (!cart.length) {
    body.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-emoji">🛒</div>
        <div class="cart-empty-text">Keranjang Kosong</div>
        <div class="cart-empty-sub">Scan atau ketik kode barang untuk menambah</div>
      </div>`;
    footer.style.display = 'none';
    return;
  }

  footer.style.display = 'block';
  body.innerHTML = `<div class="cart-list">${
    cart.map(item => `
      <div class="cart-item" id="ci-${item.kode.replace(/[^a-zA-Z0-9]/g,'')}">
        <div class="ci-emoji">${getEmoji(item.kategori)}</div>
        <div class="ci-info">
          <div class="ci-nama">${item.nama}</div>
          <div class="ci-sub">${formatRp(item.harga)} / ${item.isi}</div>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn minus" onclick="changeQty('${item.kode}',-1)">−</button>
          <input class="qty-input" type="number" min="1" value="${item.qty}" data-kode="${item.kode}" onchange="setQty(this)" onfocus="this.select()">
          <button class="qty-btn"       onclick="changeQty('${item.kode}',1)">+</button>
        </div>
        <div class="ci-harga-col">
          <div class="ci-harga">${formatRp(item.harga * item.qty)}</div>
          <div class="ci-subtotal">${item.qty}×${formatRp(item.harga)}</div>
        </div>
      </div>`).join('')
  }</div>`;

  // Flash the row that just changed
  if (flashKode) {
    const safeId = 'ci-' + flashKode.replace(/[^a-zA-Z0-9]/g,'');
    const row = document.getElementById(safeId);
    if (row) {
      row.classList.remove('flash');
      void row.offsetWidth;
      row.classList.add('flash');
    }
  }

  updateTotals();
}

/* ═══════════════════════════════════
   TOASTS
═══════════════════════════════════ */
function showSuccessToast(data) {
  clearTimeout(toastTimer);
  const ex = cart.find(i => i.kode === data.kode);
  const qty = ex ? ex.qty : 1;

  document.getElementById('lstEmoji').textContent  = getEmoji(data.kategori);
  document.getElementById('lstNama').textContent   = data.barang;
  document.getElementById('lstHarga').textContent  = formatRp(data.harga_jual) + ' / ' + data.isi;
  document.getElementById('lstQtyBadge').textContent = '×' + qty;

  document.getElementById('lastScanToast').classList.add('show');
  document.getElementById('errorToast').classList.remove('show');

  // Auto-hide after 4s in scan mode, keep in manual
  if (scanMode === 'scan') toastTimer = setTimeout(hideToasts, 4000);
}

function showErrorToast(msg) {
  clearTimeout(toastTimer);
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorToast').classList.add('show');
  document.getElementById('lastScanToast').classList.remove('show');
  toastTimer = setTimeout(hideToasts, 4000);
}

function hideToasts() {
  document.getElementById('lastScanToast').classList.remove('show');
  document.getElementById('errorToast').classList.remove('show');
}

/* ═══════════════════════════════════
   MOBILE TAB
═══════════════════════════════════ */
function mobileTab(tab) {
  const left  = document.getElementById('colLeft');
  const right = document.getElementById('colRight');
  document.getElementById('navScan').classList.toggle('active', tab==='scan');
  document.getElementById('navCart').classList.toggle('active', tab==='cart');

  if (tab === 'scan') {
    left.classList.remove('mob-hidden');
    right.classList.add('mob-hidden');
    setTimeout(() => inp.focus(), 80);
  } else {
    left.classList.add('mob-hidden');
    right.classList.remove('mob-hidden');
  }
}

/* init */
renderCart();
setMode('scan');
</script>
</body>
</html>
